description:
  en:
    localisedName: assets.swissgeol.ch
    shortDescription: Web application enabling the simple, structured, and
      harmonized recording and management of geological assets.
    longDescription: >-
      The open-source platform assets.swissgeol.ch provides access to and
      enables the management of swisstopo’s digital archive of geological
      documents. It supports the structured, standardized, and harmonized
      capture and maintenance of metadata, including both tabular and spatial
      information.


      By applying common data models and controlled vocabularies, the platform
      ensures interoperability and facilitates the integration and reuse of
      geological information across systems and stakeholders. Core
      functionalities include advanced querying, the creation and editing of
      metadata, and the consistent linking of metadata with documents stored in
      the underlying archive system.


      This approach enhances data consistency, accessibility, and long-term
      usability, contributing to a sustainable and interoperable geological data
      ecosystem.
    documentation: https://www.swissgeol.ch/
