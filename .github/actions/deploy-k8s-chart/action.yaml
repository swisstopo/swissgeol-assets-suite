name: "Deploy K8s Chart"
description: "Deploys a Kubernetes Chart"
inputs:
  TARGET_ENV:
    description: "The environment to which the chart is deployed."
    required: true
  DEPLOYMENT_NAME:
    description: "The deployment's name under which it will appear in Kubernetes."
    required: true
  REPO_PATH:
    description: "The path at which the Helm charts can be found within the repo."
    required: true
  VAULT_PATH:
    description: "The path at which the chart's secrets can be found within the Vault."
    required: true
  VAULT_ROLE:
    description: "The role with which the Vault is accessed."
    required: true
  VAULT_CA_CERT:
    description: "The certificate with which the Vault is accessed."
    required: true

runs:
  using: "composite"
  steps:
    - name: "Load secrets"
      id: load-secrets
      uses: hashicorp/vault-action@v3
      with:
        url: https://swisstopo-vault-public-vault-d680830d.382257a9.z1.hashicorp.cloud:8200
        caCertificate: ${{ inputs.VAULT_CA_CERT }}
        method: jwt
        role: ${{ env.VAULT_ROLE }}
        namespace: admin/igi/igi-cloud/swisstopo-ngm
        secrets: |
          assets/data/${{ inputs.TARGET_ENV }}                          kubeconfig   | KUBECONFIG;
          assets/data/${{ inputs.TARGET_ENV }}/${{ inputs.VAULT_PATH }} helm_values  | HELM_VALUES;
          assets/data/${{ inputs.TARGET_ENV }}/${{ inputs.VAULT_PATH }} helm_secrets | HELM_SECRETS;
          assets/data/${{ inputs.TARGET_ENV }}/${{ inputs.VAULT_PATH }} namespace    | K8S_NAMESPACE;

    - name: "Write kubeconfig file"
      shell: bash
      run: |
        echo "${{ env.HELM_VALUES }}" > ./k8s/values.yaml
        echo "${{ env.HELM_SECRETS }}" > ./k8s/secrets.yaml
        echo "${{ env.KUBECONFIG }}" > kubeconfig.yaml

    - name: "Deploy helm charts"
      shell: bash
      env:
        KUBECONFIG: ./kubeconfig.yaml
      run: |
        echo "helm upgrade --install ${{ inputs.DEPLOYMENT_NAME }} ${{ inputs.REPO_PATH }} --values ./k8s/values.yaml --values ./k8s/secrets.yaml --kubeconfig $(pwd)/kubeconfig.yaml --namespace ${{ env.K8S_NAMESPACE }}"

#        helm upgrade --install ${{ inputs.DEPLOYMENT_NAME }} ${{ inputs.REPO_PATH }} \
#          --values ./k8s/values.yaml \
#          --values ./k8s/secrets.yaml \
#          --kubeconfig $(pwd)/kubeconfig.yaml \
#          --namespace ${{ env.K8S_NAMESPACE }}
