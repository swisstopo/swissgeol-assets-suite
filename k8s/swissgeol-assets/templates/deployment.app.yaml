apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  namespace: {{ .Release.Namespace }}
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-app
    spec:
      containers:
      - name: {{ .Release.Name }}-app
        image: {{ .Values.image_app }}
        imagePullPolicy: Always
        ports:
          - containerPort: 80

        resources:
          limits:
            cpu: 40m
            memory: 20Mi
          requests:
            cpu: 20m
            memory: 10Mi
      imagePullSecrets:
      - name: {{ .Release.Namespace }}-registry



