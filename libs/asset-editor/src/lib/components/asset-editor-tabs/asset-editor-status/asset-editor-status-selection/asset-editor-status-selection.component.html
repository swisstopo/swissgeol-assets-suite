<asset-sg-checklist-header [formGroup]="form">
  Tab
  <ng-container slot="label">
    @switch (this.selection) {
      @case ("review") {
        Reviewed
      }
      @case ("approval") {
        Published
      }
    }
  </ng-container>
  <asset-sg-checklist-item formControlName="general"> General </asset-sg-checklist-item>
  <asset-sg-checklist-item>
    Dateien
    <asset-sg-checklist-item formControlName="normalFiles">Normale Dateien</asset-sg-checklist-item>
    <asset-sg-checklist-item formControlName="legalFiles">Rechtliche Einwilligungen</asset-sg-checklist-item>
  </asset-sg-checklist-item>
  <asset-sg-checklist-item>
    Kontakte
    <asset-sg-checklist-item formControlName="initiators">Auftraggeber</asset-sg-checklist-item>
    <asset-sg-checklist-item formControlName="suppliers">Einlieferer</asset-sg-checklist-item>
    <asset-sg-checklist-item formControlName="authors">Autoren</asset-sg-checklist-item>
  </asset-sg-checklist-item>
  <asset-sg-checklist-item formControlName="references">Referenzen</asset-sg-checklist-item>
  <asset-sg-checklist-item formControlName="geometries">Geometrien</asset-sg-checklist-item>
  <asset-sg-checklist-item formControlName="legacy">Altdaten</asset-sg-checklist-item>
</asset-sg-checklist-header>
