<div class="viewer-wrapper">
  @if (!hideHeader()) {
    <asset-sg-pdf-viewer-header
      class="viewer__header"
      (downloadPdf)="downloadPdf()"
      (closeViewer)="onCloseViewer()"
      [(selectedPdf)]="selectedPdf"
      [assetPdfs]="assetPdfs()"
      [hidePdfSelection]="hidePdfSelection()"
      [hideDownloadButton]="hideDownloadButton()"
      [hideCloseButton]="hideCloseButton()"
    ></asset-sg-pdf-viewer-header>
  }

  <div class="viewer">
    @if (isRendering() || hasError()) {
      <mat-progress-bar
        class="viewer__loading"
        [class.viewer__loading--error]="hasError()"
        [mode]="hasError() ? 'determinate' : 'indeterminate'"
        [value]="100"
      ></mat-progress-bar>
    }

    @if (selectedPdf()?.pageRangeClassifications) {
      <div class="viewer__toc">
        <asset-sg-pdf-viewer-toc
          [pageRangeClassifications]="selectedPdf()?.pageRangeClassifications!"
          [currentPage]="currentPage()"
          (changePageEvent)="this.navigateToPage($event)"
          [isRendering]="isRendering()"
        ></asset-sg-pdf-viewer-toc>
      </div>
    }

    <div
      #pdf
      class="viewer__page-wrapper"
      [class.viewer__page-wrapper--space-pan]="isSpacePanMode()"
      [class.viewer__page-wrapper--is-panning]="isPanning()"
      (mousedown)="onViewerMouseDown($event)"
      (pointerdown)="onViewerPointerDown($event)"
    >
      <div
        class="viewer__virtual-spacer"
        [style.height.px]="virtualTotalSize()"
        [style.width.px]="virtualContentWidth()"
      >
        @for (item of virtualItems(); track item.key) {
          <div
            class="page-slot"
            [attr.data-page-num]="item.pageNum"
            [style.height.px]="item.size"
            [style.--page-height.px]="item.size"
            [style.--page-width.px]="item.pageWidth"
            [style.transform]="item.transform"
          >
            <div class="page-slot__shimmer"></div>
          </div>
        }
      </div>
    </div>

    <div class="viewer__button-container viewer__navigation">
      <asset-sg-pdf-viewer-navigation
        [currentPage]="currentPage() >= 0 ? currentPage() : undefined"
        [pageCount]="pageCount() > 0 ? pageCount() : undefined"
        [disableInteractions]="isRendering()"
        (navigate)="handleNavigation($event)"
        (goToPage)="navigateToPage($event)"
      ></asset-sg-pdf-viewer-navigation>
    </div>

    <div class="viewer__interaction">
      <div class="viewer__button-container">
        <asset-sg-pdf-viewer-zoom
          (zoom)="handleZoom($event)"
          [disableInteractions]="isRendering()"
          [isAtMinZoomLevel]="zoom() === minZoomLevel"
          [isAtMaxZoomLevel]="zoom() === maxZoomLevel"
        ></asset-sg-pdf-viewer-zoom>
      </div>

      <div class="viewer__button-container">
        <asset-sg-pdf-viewer-rotate
          (rotateClockwise)="handleRotation()"
          [disableInteractions]="isRendering()"
        ></asset-sg-pdf-viewer-rotate>
      </div>
    </div>
  </div>
</div>
