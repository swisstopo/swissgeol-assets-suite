<h5>{{ title }}</h5>
<mat-form-field class="select">
  <svg-icon key="chevron-down" class="icon" />

  <mat-select [formControl]="form" multiple>
    @for (topping of values; track topping) {
    <mat-option [value]="topping">{{ topping.displayValue }}</mat-option>
    }
  </mat-select>
</mat-form-field>
